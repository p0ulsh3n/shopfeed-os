# ============================================================
# ShopFeed ML Serving & Infrastructure Configuration
# ============================================================

# ── Triton Inference Server ─────────────────────────────────
triton:
  url: "${TRITON_URL:-localhost:8001}"
  protocol: http    # http | grpc
  timeout_ms: 100
  max_batch_size: 128
  preferred_batch_sizes: [16, 32, 64, 128]
  optimization:
    gpu_execution_accelerator: tensorrt
    precision: fp16
    dynamic_batching:
      max_queue_delay_microseconds: 100

# ── FAISS Index ─────────────────────────────────────────────
faiss:
  dim: 256
  index_type: hnsw
  m: 32                    # HNSW connectivity
  ef_construction: 200     # Build-time beam width
  ef_search: 64            # Runtime beam width
  nprobe: 32               # IVF probes (for IVF indices)

# ── Milvus Vector Database ──────────────────────────────────
milvus:
  host: "${MILVUS_HOST:-localhost}"
  port: 19530
  user: "${MILVUS_USER:-}"
  password: "${MILVUS_PASSWORD:-}"
  use_faiss_fallback: true  # If Milvus unavailable, fall back to FAISS
  collections:
    item_embeddings:
      dim: 256
      index_type: IVF_SQ8
      nlist: 4096
      metric: IP
    user_embeddings:
      dim: 256
      index_type: IVF_SQ8
      nlist: 2048
      metric: IP

# ── Redis Feature Store ─────────────────────────────────────
redis:
  host: "${REDIS_HOST:-localhost}"
  port: 6379
  db: 0
  password: "${REDIS_PASSWORD:-}"
  max_connections: 50
  socket_timeout: 5
  embedding_ttl_hours: 168   # 7 days
  feature_ttl_hours: 24

# ── ONNX Export ─────────────────────────────────────────────
onnx:
  opset_version: 17
  optimization_level: all    # basic | extended | all
  gpu: a100
  precision: fp16
  enable_tensorrt: true

# ── Model Registry ──────────────────────────────────────────
registry:
  backend: local             # local | mlflow | s3
  model_dir: checkpoints
  cold_start_strategy: popularity
  cold_start_threshold: 5   # Min interactions before personalization
