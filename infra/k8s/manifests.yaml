# ShopFeed OS — Kubernetes Manifests (Production Hardened)
# M-05, M-06, M-08, H-04 FIX

# ─────────────────────────────────────────────────────────────────────────────
# Secrets Reference (à créer manuellement)
# kubectl create secret generic shopfeed-secrets \
#   --from-literal=jwt-secret=$(openssl rand -hex 32) \
#   --from-literal=ml-service-token=$(openssl rand -hex 32)
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: shopfeed
    service: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      service: api-gateway
  template:
    metadata:
      labels:
        service: api-gateway
    spec:
      # M-06 FIX: runAsNonRoot — ne jamais tourner en root dans les pods
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api-gateway
          image: shopfeed/api-gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shopfeed-secrets
                  key: jwt-secret
            - name: REDIS_URL
              value: redis://redis-rate:6381/0
            - name: APP_ENV
              value: production
            - name: ALLOWED_ORIGINS
              value: "https://app.shopfeed.io,https://vendor.shopfeed.io"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          # M-06 FIX: securityContext par container
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp   # Requis si readOnlyRootFilesystem: true
          # M-05 FIX: Liveness & Readiness probes
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feed-service
  labels:
    app: shopfeed
    service: feed-service
spec:
  replicas: 5
  selector:
    matchLabels:
      service: feed-service
  template:
    metadata:
      labels:
        service: feed-service
    spec:
      # M-06 FIX
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: feed-service
          image: shopfeed/feed-service:latest
          ports:
            - containerPort: 8001
          env:
            - name: REDIS_URL
              value: redis://redis-session:6379/0
            - name: KAFKA_BOOTSTRAP
              value: kafka:9092
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shopfeed-secrets
                  key: jwt-secret
            - name: USER_SERVICE_URL
              value: "http://user-service:8001"  # M-04 FIX: K8s DNS interne
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
          # M-06 FIX
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          # M-05 FIX: Probes manquantes sur feed-service
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir: {}

