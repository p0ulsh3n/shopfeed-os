---
# M-08 FIX: ML Inference Service — deployment manquant dans les manifests
# initialDelaySeconds élevé (60s) pour le chargement des modèles PyTorch/FAISS
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-inference
  labels:
    app: shopfeed
    service: ml-inference
spec:
  replicas: 2
  selector:
    matchLabels:
      service: ml-inference
  template:
    metadata:
      labels:
        service: ml-inference
    spec:
      # ML inference tourne sur GPU — runAsNonRoot reste obligatoire
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: ml-inference
          image: shopfeed/ml-inference:latest
          ports:
            - containerPort: 8100
          env:
            - name: ML_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: shopfeed-secrets
                  key: ml-service-token
            - name: APP_ENV
              value: production
            - name: FRAUD_MODEL_PATH
              value: /models/fraud_lgbm.pkl
          resources:
            requests:
              cpu: "2000m"
              memory: "4Gi"
            limits:
              cpu: "8000m"
              memory: "16Gi"
              nvidia.com/gpu: "1"       # 1 GPU par pod
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: tmp
              mountPath: /tmp
          # M-08 FIX: Probes avec délai adapté au chargement des modèles ML
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8100
            initialDelaySeconds: 60   # PyTorch + FAISS + LightGBM chargement
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8100
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ml-models-pvc
        - name: tmp
          emptyDir: {}

---
# HPA for Feed Service (most critical for latency)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: feed-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: feed-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: http_request_duration_seconds
        target:
          type: AverageValue
          averageValue: "80m"   # Scale up when >80ms p95

---
# H-04 FIX: TLS avec cert-manager + Let's Encrypt
# Prérequis: kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.0/cert-manager.yaml
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@shopfeed.io   # CHANGER en email réel
    privateKeySecretRef:
      name: letsencrypt-prod-pk
    solvers:
      - http01:
          ingress:
            class: nginx

---
# H-04 FIX: Ingress avec TLS automatique via cert-manager
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopfeed-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "live-service,feed-service"
    # H-04 FIX: cert-manager gère le certificat TLS automatiquement
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  # H-04 FIX: TLS — cert-manager va créer et renouveler le certificat
  tls:
    - hosts:
        - api.shopfeed.io
      secretName: shopfeed-tls-cert   # Secret créé automatiquement par cert-manager
  rules:
    - host: api.shopfeed.io
      http:
        paths:
          - path: /api/v1/feed
            pathType: Prefix
            backend:
              service:
                name: feed-service
                port:
                  number: 8001
          - path: /ws/
            pathType: Prefix
            backend:
              service:
                name: live-service
                port:
                  number: 8002
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000

---
# M-06 FIX: NetworkPolicy Zero Trust — un pod ne peut recevoir du trafic
# que des sources explicitement autorisées. Par défaut tout est DENY.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-netpol
spec:
  podSelector:
    matchLabels:
      service: api-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx   # Uniquement depuis le load balancer
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - podSelector:
            matchLabels:
              service: redis-rate
      ports:
        - protocol: TCP
          port: 6381
    - to:
        - podSelector:
            matchLabels:
              service: postgres
      ports:
        - protocol: TCP
          port: 5432
    - ports:
        - protocol: UDP
          port: 53    # DNS

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ml-inference-netpol
spec:
  podSelector:
    matchLabels:
      service: ml-inference
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: shopfeed    # Uniquement les pods ShopFeed authentifiés
      ports:
        - protocol: TCP
          port: 8100
  egress:
    - to:
        - podSelector:
            matchLabels:
              service: redis-ml
      ports:
        - protocol: TCP
          port: 6380
    - ports:
        - protocol: UDP
          port: 53    # DNS
