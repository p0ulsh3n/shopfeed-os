# ShopFeed OS — Redis Configuration

# ──────────────────────────────────────────────────────────
# Instance 1: Session State (Section 13)
# ──────────────────────────────────────────────────────────

session_state:
  host: redis-session
  port: 6379
  db: 0
  maxmemory: "2gb"
  maxmemory_policy: "allkeys-lru"     # LRU eviction for session data
  key_prefix: "session:"
  default_ttl_s: 1800                  # 30 minutes

# ──────────────────────────────────────────────────────────
# Instance 2: Feature Store Cache
# ──────────────────────────────────────────────────────────

feature_store:
  host: redis-features
  port: 6380
  db: 0
  maxmemory: "4gb"
  maxmemory_policy: "volatile-lfu"    # LFU for features (frequent access patterns)
  key_prefix: "feat:"
  default_ttl_s: 3600                  # 1 hour

# ──────────────────────────────────────────────────────────
# Instance 3: Rate Limiting
# ──────────────────────────────────────────────────────────

rate_limiting:
  host: redis-rate
  port: 6381
  db: 0
  maxmemory: "512mb"
  maxmemory_policy: "allkeys-lru"
  key_prefix: "rl:"
  default_ttl_s: 60                    # 1 minute sliding window

# ──────────────────────────────────────────────────────────
# Instance 4: Model Parameter Server (Monolith sync)
# ──────────────────────────────────────────────────────────

parameter_server:
  host: redis-params
  port: 6382
  db: 0
  maxmemory: "1gb"
  maxmemory_policy: "noeviction"      # Never evict model params
  key_prefix: "model:"
  default_ttl_s: 0                     # No TTL — manual management

# ──────────────────────────────────────────────────────────
# Instance 5: Real-Time Counters (Section 06)
# "Chaque view, like, purchase met à jour atomiquement via Redis"
# ──────────────────────────────────────────────────────────

realtime_counters:
  host: redis-counters
  port: 6383
  db: 0
  maxmemory: "2gb"
  maxmemory_policy: "allkeys-lru"      # Evict oldest counters if full
  key_prefix: ""                        # Keys: video:{id}:counters, live:{id}:viewers
  default_ttl_s: 604800                 # 7 days — old counters auto-expire
  # Batch sync to PostgreSQL every 5 minutes via CounterSyncService

